name: Generate Systems Engineer Resume

on:
  push:
    branches: 
      - main
    tags:
       - '*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  workflow_call:

jobs:
  build_latex:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - title: "Systems Engineer Principal"
            latexfile: systems-engineer-principal-resume.tex
            id: "systems-engineer-principal"
          - title: "Systems Engineer Manager"
            latexfile: systems-engineer-manager-resume.tex
            id: "systems-engineer-manager"
    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
      with:
        egress-policy: audit

    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 1
        ref: main

    - name: Determine correct TeX Live path
      id: determine-texlive-path
      run: |
        TEXMFHOME=$(tlmgr conf texmf TEXMFHOME | awk 'NF>1{print $NF}')
        echo "::set-output name=texlive_path::$TEXMFHOME"

    - name: Install TeX Live cache dependencies
      id: texlive-cache-restore
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ${{ steps.determine-texlive-path.outputs.texlive_path }}
        key: texlive-cache-${{ runner.os }}-${{ hashFiles('**/*.tex') }}
        restore-keys: texlive-cache-

    - name: ${{ matrix.title }} latex2pdf
      if: ${{ hashFiles('systems-engineer-principal-resume.tex') != '' }}
      id: compile-latex-document
      uses: xu-cheng/latex-action@6549dc21effb2730855a1281407ecfcececc6c1b # 4.1.0
      with:
        root_file: ${{ matrix.latexfile }}
        docker_image: ghcr.io/xu-cheng/texlive-alpine@sha256:8b4a00b6a17ebe6b96dee107d82f0cb3eb40daf322f1e23809a9be26486963dd # 20260401
        extra_system_packages: "inkscape ghostscript"
        pre_compile: |
          tlmgr option repository https://mirror.ctan.org/systems/texlive/tlnet
          tlmgr update --self
          tlmgr update --all
        post_compile: "latexmk -c"
  
    - name: ${{ matrix.title }} upload PDF to the workflow tab
      if: ${{ hashFiles(format('{0}-resume.pdf', matrix.id)) != '' }}
      id: upload-workflow-tab
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: ${{ matrix.id }}-resume
        path: ${{ matrix.id }}-resume.pdf
        if-no-files-found: warn
